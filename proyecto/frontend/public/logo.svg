<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="bg" x1="25%" y1="0%" x2="75%" y2="100%">
      <stop offset="0%"   stop-color="#5cb8ff"/>
      <stop offset="50%"  stop-color="#2979f5"/>
      <stop offset="100%" stop-color="#1238b8"/>
    </linearGradient>
    <linearGradient id="panel" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#7dcfff" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#1545bf" stop-opacity="0.65"/>
    </linearGradient>
    <linearGradient id="ring" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#daeeff"/>
      <stop offset="100%" stop-color="#80c0f8"/>
    </linearGradient>
    <radialGradient id="gloss" cx="35%" cy="30%" r="60%">
      <stop offset="0%"   stop-color="white" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#0d2a8a" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Cuerpo del notepad -->
  <rect x="6" y="16" width="88" height="78" rx="17" fill="url(#bg)" filter="url(#shadow)"/>
  <rect x="6" y="16" width="88" height="78" rx="17" fill="url(#gloss)"/>

  <!-- Panel interior -->
  <rect x="15" y="34" width="70" height="55" rx="10" fill="url(#panel)"/>

  <!-- Líneas de texto -->
  <rect x="23" y="45" width="34" height="3.5" rx="1.75" fill="white" opacity="0.82"/>
  <rect x="23" y="55" width="52" height="3.5" rx="1.75" fill="white" opacity="0.82"/>
  <rect x="23" y="65" width="52" height="3.5" rx="1.75" fill="white" opacity="0.82"/>
  <rect x="23" y="75" width="38" height="3.5" rx="1.75" fill="white" opacity="0.82"/>

  <!-- Anillos espiral -->
  <path d="M 21 22 Q 21 6 30.5 6 Q 40 6 40 22"
        fill="none" stroke="url(#ring)" stroke-width="5.5" stroke-linecap="round"/>
  <path d="M 39 22 Q 39 6 49.5 6 Q 60 6 60 22"
        fill="none" stroke="url(#ring)" stroke-width="5.5" stroke-linecap="round"/>
  <path d="M 59 22 Q 59 6 68.5 6 Q 78 6 78 22"
        fill="none" stroke="url(#ring)" stroke-width="5.5" stroke-linecap="round"/>
</svg>
