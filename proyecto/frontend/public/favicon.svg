<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="128" y2="128" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="55%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="white" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="128" height="128" rx="32" fill="url(#bg)"/>

  <!-- Top shine overlay -->
  <rect x="0" y="0" width="128" height="70" rx="32" fill="url(#shine)"/>

  <!-- Ring pins -->
  <rect x="40" y="16" width="9" height="29" rx="4.5" fill="rgba(255,255,255,0.92)"/>
  <rect x="79" y="16" width="9" height="29" rx="4.5" fill="rgba(255,255,255,0.92)"/>

  <!-- Calendar body frame -->
  <rect x="16" y="32" width="96" height="80" rx="14"
        fill="rgba(255,255,255,0.13)"
        stroke="rgba(255,255,255,0.88)"
        stroke-width="5.8"/>

  <!-- Header divider -->
  <line x1="16" y1="56" x2="112" y2="56"
        stroke="rgba(255,255,255,0.5)" stroke-width="4.5"/>

  <!-- Checkmark — main visual element -->
  <path d="M 35 83 L 56 102 L 93 64"
        stroke="white"
        stroke-width="10.5"
        stroke-linecap="round"
        stroke-linejoin="round"
        fill="none"/>
</svg>
